services:
  postgres:
    image: postgres:16
    container_name: glimps_backend_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-glimps}
      POSTGRES_USER: ${POSTGRES_USER:-glimps}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glimps}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glimps} -d ${POSTGRES_DB:-glimps}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: glimps_backend_redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
